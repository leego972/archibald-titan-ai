# Build: macOS (signed+notarized via xcrun notarytool), Windows, Linux
name: Desktop Build & Upload

on:
  push:
    branches: [main, master]
    paths:
      # Electron app source
      - 'electron/**'
      # Web app (gets bundled into the desktop build)
      - 'client/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      # This workflow file itself
      - '.github/workflows/desktop-build.yml'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_cmd: build:linux
            artifact: "ArchibaldTitan-*-linux-x86_64.AppImage"
          - os: windows-latest
            platform: windows
            build_cmd: build:win
            artifact: "ArchibaldTitan-*-win-x64.exe"
          - os: macos-latest
            platform: mac
            build_cmd: build:mac
            artifact: "ArchibaldTitan-*-mac-*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}
    timeout-minutes: 90

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Copy frontend to electron (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p electron/public
          cp -r dist/public/* electron/public/

      - name: Copy frontend to electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/public | Out-Null
          Copy-Item -Recurse -Force dist/public/* electron/public/

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      # ── macOS: Import Developer ID certificate ───────────────────────────────
      - name: Import macOS code signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}

      # ── macOS: Write API key file ─────────────────────────────────────────────
      - name: Write App Store Connect API key to file
        if: runner.os == 'macOS'
        run: |
          mkdir -p /tmp/private_keys
          printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          echo "API key file created ($(wc -c < /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8) bytes)"

      # ── Build Electron app (macOS, signed only — no built-in notarization) ────
      - name: Build Electron app (macOS, signed)
        if: runner.os == 'macOS'
        working-directory: electron
        env:
          # Disable electron-builder's built-in notarization — we handle it below
          ELECTRON_BUILDER_SKIP_NOTARIZE: 1
        run: npm run ${{ matrix.build_cmd }}

      # ── macOS: Notarize the DMG using xcrun notarytool ────────────────────────
      - name: Notarize macOS DMG
        if: runner.os == 'macOS'
        run: |
          DMG=$(ls electron/dist/ArchibaldTitan-*-mac-*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found to notarize"
            ls -la electron/dist/
            exit 1
          fi
          echo "Notarizing: $DMG"
          # Submit without --wait to avoid timeout issues with Apple's slow notarization service
          SUBMISSION_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --key /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
            --key-id ${{ secrets.APPLE_API_KEY_ID }} \
            --issuer ${{ secrets.APPLE_API_ISSUER_ID }} 2>&1)
          echo "$SUBMISSION_OUTPUT"
          SUBMISSION_ID=$(echo "$SUBMISSION_OUTPUT" | grep -E "^  id:" | awk '{print $2}' | head -1)
          if [ -z "$SUBMISSION_ID" ]; then
            echo "ERROR: Could not extract submission ID"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"
          # Poll for completion (up to 3 hours = 360 x 30s)
          MAX_ATTEMPTS=360
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            sleep 30
            STATUS_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
              --key-id ${{ secrets.APPLE_API_KEY_ID }} \
              --issuer ${{ secrets.APPLE_API_ISSUER_ID }} 2>&1)
            STATUS=$(echo "$STATUS_OUTPUT" | grep -E "^  status:" | awk '{print $2}')
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — Status: $STATUS"
            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted! Stapling ticket..."
              xcrun stapler staple "$DMG"
              echo "Notarization complete!"
              exit 0
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "ERROR: Notarization failed with status: $STATUS"
              echo "$STATUS_OUTPUT"
              xcrun notarytool log "$SUBMISSION_ID" \
                --key /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8 \
                --key-id ${{ secrets.APPLE_API_KEY_ID }} \
                --issuer ${{ secrets.APPLE_API_ISSUER_ID }} 2>&1 || true
              exit 1
            fi
          done
          echo "ERROR: Notarization timed out after 3 hours"
          exit 1

      - name: Build Electron app (Linux/Windows)
        if: runner.os != 'macOS'
        working-directory: electron
        run: npm run ${{ matrix.build_cmd }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload binary to Titan release system
        shell: bash
        working-directory: electron/dist
        continue-on-error: true
        run: |
          FILE=$(ls ${{ matrix.artifact }} 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "Warning: No artifact found matching pattern: ${{ matrix.artifact }}"
            ls -la
            exit 0
          fi
          echo "Uploading $FILE for ${{ matrix.platform }} v${{ steps.version.outputs.version }}..."
          HTTP_STATUS=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.TITAN_API_URL }}/api/releases/ci-upload" \
            -H "x-ci-api-key: ${{ secrets.CI_RELEASE_API_KEY }}" \
            -F "file=@$FILE" \
            -F "platform=${{ matrix.platform }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            --max-time 600 || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Upload complete! Server response:"
            cat /tmp/upload_response.txt
          else
            echo "Warning: Titan API upload returned HTTP $HTTP_STATUS (non-fatal)"
            cat /tmp/upload_response.txt 2>/dev/null || true
          fi

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: titan-${{ matrix.platform }}
          path: electron/dist/${{ matrix.artifact }}
          retention-days: 30
