# Build: macOS (signed+notarized), Windows, Linux — updated P12 cert
name: Desktop Build & Upload

on:
  push:
    branches: [main, master]
    paths:
      # Electron app source
      - 'electron/**'
      # Web app (gets bundled into the desktop build)
      - 'client/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      # This workflow file itself
      - '.github/workflows/desktop-build.yml'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_cmd: build:linux
            artifact: "ArchibaldTitan-*-linux-x86_64.AppImage"
          - os: windows-latest
            platform: windows
            build_cmd: build:win
            artifact: "ArchibaldTitan-*-win-x64.exe"
          - os: macos-latest
            platform: mac
            build_cmd: build:mac
            artifact: "ArchibaldTitan-*-mac-*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Copy frontend to electron (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p electron/public
          cp -r dist/public/* electron/public/

      - name: Copy frontend to electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/public | Out-Null
          Copy-Item -Recurse -Force dist/public/* electron/public/

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      # ── Build Electron app ───────────────────────────────────────────────────
      # macOS code signing is currently disabled - builds unsigned DMG
      # See MACOS_SIGNING.md for setup instructions
      - name: Build Electron app (macOS, unsigned)
        if: runner.os == 'macOS'
        working-directory: electron
        env:
          # Skip code signing by setting CSC_IDENTITY_AUTO_DISCOVERY to false
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run ${{ matrix.build_cmd }}

      - name: Build Electron app (Linux/Windows)
        if: runner.os != 'macOS'
        working-directory: electron
        run: npm run ${{ matrix.build_cmd }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload binary to Titan release system
        shell: bash
        working-directory: electron/dist
        continue-on-error: true
        run: |
          FILE=$(ls ${{ matrix.artifact }} 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "Warning: No artifact found matching pattern: ${{ matrix.artifact }}"
            ls -la
            exit 0
          fi
          echo "Uploading $FILE for ${{ matrix.platform }} v${{ steps.version.outputs.version }}..."
          HTTP_STATUS=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.TITAN_API_URL }}/api/releases/ci-upload" \
            -H "x-ci-api-key: ${{ secrets.CI_RELEASE_API_KEY }}" \
            -F "file=@$FILE" \
            -F "platform=${{ matrix.platform }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            --max-time 600 || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Upload complete! Server response:"
            cat /tmp/upload_response.txt
          else
            echo "Warning: Titan API upload returned HTTP $HTTP_STATUS (non-fatal)"
            cat /tmp/upload_response.txt 2>/dev/null || true
          fi

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: titan-${{ matrix.platform }}
          path: electron/dist/${{ matrix.artifact }}
          retention-days: 30
