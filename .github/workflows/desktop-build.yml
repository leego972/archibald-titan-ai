# Build: macOS (signed+notarized via xcrun notarytool), Windows, Linux
name: Desktop Build & Upload

on:
  push:
    branches: [main, master]
    paths:
      # Electron app source
      - 'electron/**'
      # Web app (gets bundled into the desktop build)
      - 'client/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      # This workflow file itself
      - '.github/workflows/desktop-build.yml'

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-upload:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_cmd: build:linux
            artifact: "ArchibaldTitan-*-linux-x86_64.AppImage"
          - os: windows-latest
            platform: windows
            build_cmd: build:win
            artifact: "ArchibaldTitan-*-win-x64.exe"
          - os: macos-latest
            platform: mac
            build_cmd: build:mac
            artifact: "ArchibaldTitan-*-mac-*.dmg"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}
    timeout-minutes: 120

    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        run: git config --system core.longpaths true

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Copy frontend to electron (Linux/Mac)
        if: runner.os != 'Windows'
        run: |
          mkdir -p electron/public
          cp -r dist/public/* electron/public/

      - name: Copy frontend to electron (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path electron/public | Out-Null
          Copy-Item -Recurse -Force dist/public/* electron/public/

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      # ── macOS: Import Developer ID certificate ───────────────────────────────
      - name: Import macOS code signing certificate
        if: runner.os == 'macOS'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_P12 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}

      # ── macOS: Write App Store Connect API key file ───────────────────────────
      - name: Write App Store Connect API key to file
        if: runner.os == 'macOS'
        run: |
          mkdir -p /tmp/private_keys
          printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" \
            > /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          echo "API key file created ($(wc -c < /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8) bytes)"

      # ── Build Electron app (macOS, signed only — notarization handled below) ──
      - name: Build Electron app (macOS, signed)
        if: runner.os == 'macOS'
        working-directory: electron
        env:
          ELECTRON_BUILDER_SKIP_NOTARIZE: 1
        run: npm run ${{ matrix.build_cmd }}

      # ── macOS: Submit DMG for notarization (non-blocking poll loop) ───────────
      - name: Notarize macOS DMG
        if: runner.os == 'macOS'
        env:
          KEY_FILE: /tmp/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail

          DMG=$(ls electron/dist/ArchibaldTitan-*-mac-*.dmg 2>/dev/null | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found to notarize"
            ls -la electron/dist/
            exit 1
          fi
          echo "Found DMG: $DMG"

          echo "Submitting to Apple notarization service..."
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$DMG" \
            --key "$KEY_FILE" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER" \
            --output-format json 2>&1)

          echo "Submit output: $SUBMIT_OUTPUT"

          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)

          if [ -z "$SUBMISSION_ID" ]; then
            echo "ERROR: Could not extract submission ID from notarytool output"
            echo "Raw output: $SUBMIT_OUTPUT"
            exit 1
          fi
          echo "Submission ID: $SUBMISSION_ID"
          echo "$SUBMISSION_ID" > /tmp/notarization_submission_id.txt

          MAX_ATTEMPTS=180
          ATTEMPT=0
          STATUS="In Progress"

          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Polling attempt $ATTEMPT / $MAX_ATTEMPTS — waiting 30s..."
            sleep 30

            INFO_OUTPUT=$(xcrun notarytool info "$SUBMISSION_ID" \
              --key "$KEY_FILE" \
              --key-id "$KEY_ID" \
              --issuer "$ISSUER" \
              --output-format json 2>&1) || true

            STATUS=$(echo "$INFO_OUTPUT" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('status','Unknown'))" 2>/dev/null || echo "Unknown")

            echo "  Status: $STATUS"

            if [ "$STATUS" = "Accepted" ]; then
              echo "Notarization accepted!"
              break
            elif [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              echo "ERROR: Notarization failed with status: $STATUS"
              xcrun notarytool log "$SUBMISSION_ID" \
                --key "$KEY_FILE" \
                --key-id "$KEY_ID" \
                --issuer "$ISSUER" \
                2>&1 | tee /tmp/notarization_rejection_log.json || true
              exit 1
            fi
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "ERROR: Notarization timed out after 90 minutes. Last status: $STATUS"
            exit 1
          fi

          echo "Stapling notarization ticket to $DMG..."
          xcrun stapler staple "$DMG"
          echo "Notarization and stapling complete!"

      - name: Upload notarization log artifact
        if: runner.os == 'macOS' && always()
        uses: actions/upload-artifact@v4
        with:
          name: notarization-log-${{ github.run_id }}
          path: |
            /tmp/notarization_rejection_log.json
            /tmp/notarization_submission_id.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Build Electron app (Linux/Windows)
        if: runner.os != 'macOS'
        working-directory: electron
        run: npm run ${{ matrix.build_cmd }}

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Upload binary to Titan release system
        shell: bash
        working-directory: electron/dist
        continue-on-error: true
        run: |
          FILE=$(ls ${{ matrix.artifact }} 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "Warning: No artifact found matching pattern: ${{ matrix.artifact }}"
            ls -la
            exit 0
          fi
          echo "Uploading $FILE for ${{ matrix.platform }} v${{ steps.version.outputs.version }}..."
          HTTP_STATUS=$(curl -s -o /tmp/upload_response.txt -w "%{http_code}" \
            -X POST "${{ secrets.TITAN_API_URL }}/api/releases/ci-upload" \
            -H "x-ci-api-key: ${{ secrets.CI_RELEASE_API_KEY }}" \
            -F "file=@$FILE" \
            -F "platform=${{ matrix.platform }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            --max-time 600 || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "Upload complete! Server response:"
            cat /tmp/upload_response.txt
          else
            echo "Warning: Titan API upload returned HTTP $HTTP_STATUS (non-fatal)"
            cat /tmp/upload_response.txt 2>/dev/null || true
          fi

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: titan-${{ matrix.platform }}
          path: electron/dist/${{ matrix.artifact }}
          retention-days: 30

  # ── Publish GitHub Release (public, permanent download links) ─────────────
  # Creates a versioned GitHub Release and attaches all three platform binaries.
  # The Archibald server's /api/releases/sync-github endpoint reads these URLs
  # so the download page lights up automatically after a CI run.
  publish-release:
    name: Publish GitHub Release
    needs: build-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./electron/package.json').version")" >> $GITHUB_OUTPUT

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifacts into one directory
        run: |
          mkdir -p release
          find release-assets -type f \( \
            -name "*.exe" \
            -o -name "*.dmg" \
            -o -name "*.AppImage" \
            -o -name "*.deb" \
          \) -exec cp {} release/ \;
          echo "=== Release artifacts ==="
          ls -lh release/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Archibald Titan v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Notify the Titan server to sync its releases DB from the new GitHub Release.
      # Non-fatal — the admin can also trigger sync manually from the dashboard.
      - name: Trigger Titan release sync
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.TITAN_API_URL }}" ]; then
            echo "TITAN_API_URL not set — skipping sync trigger"
            exit 0
          fi
          curl -sf -X POST "${{ secrets.TITAN_API_URL }}/api/releases/sync-github" \
            -H "x-ci-api-key: ${{ secrets.CI_RELEASE_API_KEY }}" \
            --max-time 30 \
            || echo "Sync trigger failed (non-fatal)"
