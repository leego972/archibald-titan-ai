name: Sync to Architabot

on:
  push:
    branches: [main]
    paths:
      # Server code that architabot depends on
      - 'server/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'drizzle.config.ts'
      - 'drizzle/**'
      # This workflow file itself
      - '.github/workflows/sync-to-architabot.yml'

concurrency:
  group: sync-architabot
  cancel-in-progress: true

jobs:
  sync:
    name: Mirror to architabot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to architabot mirror
        run: |
          git remote add mirror https://x-access-token:${{ secrets.ARCHITABOT_SYNC_TOKEN }}@github.com/leego972/architabot.git || true
          git push mirror main --force || echo "[sync] Push failed — ARCHITABOT_SYNC_TOKEN may be expired or missing. Skipping mirror sync."
        env:
          GIT_TERMINAL_PROMPT: 0
