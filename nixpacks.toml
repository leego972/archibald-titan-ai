# Railway nixpacks configuration
    # Pins Node.js 22 because Vite 7 requires Node >= 20 and nixpacks defaults to Node 18

    [phases.setup]
    nixPkgs = ["nodejs_22"]

    [phases.install]
    cmds = ["npm install -g pnpm@10.4.1 --silent && pnpm install --no-frozen-lockfile"]

    [phases.build]
    cmds = ["NODE_ENV=production pnpm build"]
    dependsOn = ["install"]

    [start]
    cmd = "node dist/index.js"
    